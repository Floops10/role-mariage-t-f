/* ═══════════════════════════════════════════════
   FIREBASE
   ═══════════════════════════════════════════════ */
const FB_URL = 'https://roles-du-mariage-default-rtdb.europe-west1.firebasedatabase.app/signups.json';
let _signups = {};
let _unsaved = false;

async function fbSave() {
  _unsaved = true;
  try {
    const resp = await fetch(FB_URL, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(_signups) });
    if (resp.ok) _unsaved = false;
  } catch(e) {}
}
async function fbLoad() {
  if (_unsaved) { fbSave(); return; }
  try {
    const r = await fetch(FB_URL);
    if (!r.ok) return;
    const data = await r.json();
    _signups = (data && typeof data === 'object') ? data : {};
  } catch(e) {}
}

function getData()   { return { signups: _signups }; }
function saveData(d) { _signups = d.signups || {}; fbSave(); }

function getRoleSignups(id) { return (_signups || {})[String(id)] || []; }
function isRoleFull(id)     { const s = ROLES[id] ? (ROLES[id].spots || 2) : 2; return getRoleSignups(id).length >= s; }

function doSignup(id, name) {
  const maxSp = ROLES[id] ? (ROLES[id].spots || 2) : 2;
  if (getRoleSignups(id).length >= maxSp || getRoleSignups(id).map(n=>n.toLowerCase()).includes(name.toLowerCase().trim())) return false;
  if (!_signups[id]) _signups[id] = [];
  _signups[id].push(name.trim());
  fbSave();
  return true;
}
function doWithdraw(id, name) {
  if (_signups[id])
    _signups[id] = _signups[id].filter(n => n.toLowerCase() !== name.toLowerCase().trim());
  fbSave();
}

   ═══════════════════════════════════════════════ */
const observer = new IntersectionObserver(function (entries) {
  entries.forEach(function (e, i) {
    if (e.isIntersecting) {
      setTimeout(function () { e.target.classList.add('visible'); }, i * 70);
      observer.unobserve(e.target);
    }
  });
}, { threshold: .08 });

/* Nav scroll */
window.addEventListener('scroll', function () {
  const nav = document.getElementById('mainNav');
  if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

/* ═══════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════ */
function render(data) {
  const { top5, topTraits, userName: uName } = data;
  userName = uName || 'Vous';
  top5Ids  = top5;

  const t1 = topTraits[0] || 'orga';
  const tm = TRAIT_META[t1] || TRAIT_META.orga;
  const initLetter = userName[0] || '✦';

  document.getElementById('app').innerHTML = `
    <div class="hero" aria-labelledby="hero-name">
      <div class="hero-inner">
        <span class="hero-greeting">Votre profil,</span>
        <h1 class="hero-name" id="hero-name">${userName}</h1>
        <div class="hero-rule">
          <div class="rule-line"></div>
          <div class="rule-dot"></div>
          <div class="rule-line"></div>
        </div>
        <span class="hero-profile-lbl">Personnalité dominante</span>
        <h2 class="hero-profile-title">${tm.label}</h2>
        <p class="hero-profile-desc">${tm.desc}</p>
      </div>
      <span class="hero-ghost" aria-hidden="true">${initLetter}</span>
    </div>

    <div class="section">
      <span class="sec-eyebrow">Vos correspondances</span>
      <h2 class="sec-title">Les 5 rôles faits pour vous</h2>
      <p class="sec-desc">Deux places maximum par rôle — rejoignez ceux qui vous parlent, passez les autres.</p>
      <div id="rolesList" aria-live="polite"></div>
    </div>

    <div class="footer-section">
      <span class="fs-script">Et maintenant ?</span>
      <h3 class="fs-title">Explorer tous les rôles</h3>
      <p class="fs-desc">Consultez la liste complète des rôles et inscrivez-vous directement.</p>
      <div class="fs-ctas">
        <a href="roles.html" class="btn btn-primary">Voir tous les rôles</a>
        <a href="quiz.html"  class="btn btn-outline">Recommencer</a>
      </div>
    </div>
  `;

  renderRoleCards();
}

function renderRoleCards() {
  const list = document.getElementById('rolesList');
  if (!list) return;

  list.innerHTML = top5Ids.map(function (id) {
    const r = ROLES[id];
    if (!r) return '';

    const maxSp    = r.spots || 2;
    const sups     = getRoleSignups(id);
    const full     = sups.length >= maxSp;
    const free     = maxSp - sups.length;
    const accepted = decisions[id] === 'accepted';
    const refused  = decisions[id] === 'refused';
    const userIn   = sups.map(n => n.toLowerCase()).includes(userName.toLowerCase());

    const badgeH = !full
      ? '<span class="rc-badge open">' + (free === 1 && sups.length > 0 ? '1 restante' : free + ' place' + (free > 1 ? 's' : '')) + '</span>'
      : '<span class="rc-badge full-b">Complet</span>';
    const namesH = sups.length
      ? '<p class="rc-names">' + sups.join(' · ') + '</p>'
      : '';

    let actionsH = '';
    if (userIn || accepted) {
      actionsH = '<div class="btn-accepted-badge">✓ Inscrit(e)</div><button class="btn-remove" onclick="withdrawRole(' + id + ')">Retirer</button>';
    } else if (refused) {
      actionsH = '<div style="font-family:var(--font-body);font-weight:300;font-size:.73rem;color:var(--text-light);padding:.4rem 0">Décliné</div>' +
                 '<button class="btn-remove" onclick="undecide(' + id + ')">Reconsidérer</button>';
    } else if (full) {
      actionsH = '<button class="btn-accept" disabled>Complet</button>';
    } else {
      actionsH = '<button class="btn-accept" onclick="acceptRole(' + id + ')">Rejoindre</button>' +
                 '<button class="btn-refuse" onclick="refuseRole(' + id + ')">Passer</button>';
    }

    return '<div class="role-card' + (userIn||accepted?' accepted':'') + (refused?' refused':'') + '" id="rc' + id + '">' +
      '<div class="rc-inner">' +
        '<div>' +
          '<p class="rc-meta">Rôle ' + r.num + ' — ' + r.phase + '</p>' +
          '<h3 class="rc-name">' + r.nom + '</h3>' +
          '<p class="rc-en">' + r.en + '</p>' +
          '<p class="rc-mission">' + r.mission + '</p>' +
        '</div>' +
        '<div class="rc-side">' + badgeH + namesH + actionsH + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  document.querySelectorAll('.role-card:not(.visible)').forEach(el => observer.observe(el));
}

function acceptRole(id) { doSignup(id, userName); decisions[id] = 'accepted'; renderRoleCards(); }
function refuseRole(id) { decisions[id] = 'refused'; renderRoleCards(); }
function undecide(id)   { delete decisions[id]; renderRoleCards(); }
function withdrawRole(id) { doWithdraw(id, userName); delete decisions[id]; renderRoleCards(); }

/* ═══════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════ */
const raw = sessionStorage.getItem('phf_results');
if (!raw) {
  document.getElementById('app').innerHTML = `
    <div class="no-data">
      <h2>Aucun résultat</h2>
      <p>Remplissez d'abord le questionnaire pour découvrir vos rôles.</p>
      <a href="quiz.html" class="btn btn-primary" style="margin-top:1rem">Commencer →</a>
    </div>`;
} else {
  try {
    const d = JSON.parse(raw);
    if (!d.top5?.length) throw new Error('invalid');
    // Charger Firebase d'abord, puis rendre
    fbLoad().then(function() {
      render(d);
      setInterval(function() { fbLoad().then(renderRoleCards); }, 30000);
    });
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="no-data">
        <h2>Données expirées</h2>
        <p>Veuillez recommencer le questionnaire.</p>
        <a href="quiz.html" class="btn btn-primary" style="margin-top:1rem">Recommencer →</a>
      </div>`;
  }
}
</script>

<script src="transitions.js"></script>
</body>
</html>
